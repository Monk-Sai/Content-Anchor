<!DOCTYPE html>
<html>
  <head>
    <title>Image Generator</title>
  </head>
  <body>
    <h1>Image Generator</h1>
    <form id="image-generator-form">
      <label for="description">Description:</label>
      <input type="text" id="description" name="description" required />
      <br />
      <label for="number-of-images">Number of images:</label>
      <input type="number" id="number-of-images" name="number-of-images" min="1" max="10" required />
      <br />
      <button type="submit">Generate Images</button>
    </form>
    <div id="generated-images"></div>
    <script src="image-gen2.js"></script>
  </body>
</html>
